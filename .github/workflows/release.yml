name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KEYCHAIN_PATH: /tmp/signing.keychain-db
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import code signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          echo "P12 file size: $(wc -c < "$CERT_PATH") bytes"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Download and import Apple intermediate certificates
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o $RUNNER_TEMP/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -A || true

          # Set keychain search list and default
          security list-keychain -d user -s "$KEYCHAIN_PATH" /Library/Keychains/System.keychain
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Debug: verify certificate
          echo "=== Keychain search list ==="
          security list-keychain -d user
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== All identities in keychain ==="
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Set up notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Build and create DMG
        run: ./scripts/create-dmg.sh

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: so-agentbar.dmg

      - name: Sign DMG and generate appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Sparkle bin 경로
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -path "*/artifacts/*" 2>/dev/null | head -1)

          # DMG 서명
          SIGNATURE=$("$SPARKLE_BIN" so-agentbar.dmg -s "$SPARKLE_PRIVATE_KEY" 2>/dev/null | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          DMG_SIZE=$(wc -c < so-agentbar.dmg | tr -d ' ')
          VERSION="${GITHUB_REF_NAME#v}"
          PUBDATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          cat > docs/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>so-agentbar</title>
              <link>https://sotthang.github.io/so-agentbar/appcast.xml</link>
              <item>
                <title>Version $VERSION</title>
                <pubDate>$PUBDATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/sotthang/so-agentbar/releases/download/${GITHUB_REF_NAME}/so-agentbar.dmg"
                  sparkle:edSignature="$SIGNATURE"
                  length="$DMG_SIZE"
                  type="application/x-apple-diskimage"
                />
              </item>
            </channel>
          </rss>
          EOF

      - name: Deploy appcast.xml to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}" || echo "No changes"
          git push origin HEAD:main

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
